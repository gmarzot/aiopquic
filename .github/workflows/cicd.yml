name: CI

# PR + main test gate. Releases (TestPyPI -> PyPI -> GitHub Release) live
# in release.yml, triggered manually via workflow_dispatch.
#
# Tiers:
#   - core: unit + loopback. Required on (linux, macos) x (3.12, 3.13, 3.14).
#   - native: picoquic_ct + picohttp_ct subprocess smoke. Required.
#   - peer interop: qh3 + aioquic cross-stack transfers. Required.
#   - benchmark: perf floor on shared runners — advisory only
#     (continue-on-error); perf noise is not a correctness signal.

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every job + every third-party action into the Node 24 runtime
# ahead of GitHub's 2026-06-02 hard cutover (Node 20 removed entirely
# 2026-09-16). One env beats per-action version cherry-picking and
# covers actions that haven't shipped a Node-24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  core:
    name: core / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiopquic
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run core tier
        timeout-minutes: 15
        run: python -m pytest tests/ -v -m "not interop and not native"

  native:
    name: picoquic / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiopquic
        with:
          with-native-tests: 'true'
      - name: Run native tier
        timeout-minutes: 20
        run: python -m pytest tests/ -v -m native

  peer-interop:
    # aioquic + qh3 are pip-installable Python QUIC implementations.
    # tests/interop/test_aioquic.py and test_qh3.py each spawn the
    # peer as a subprocess (tests/interop/peers/*_echo.py) and exchange
    # bytes with aiopquic in both directions. Skipped silently in the
    # core tier because aioquic/qh3 aren't in our dev extras; this job
    # installs them and runs those test files specifically.
    name: peer interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiopquic
      - name: Install Python QUIC peer stacks
        run: pip install aioquic qh3
      - name: Run Python-peer interop tests
        timeout-minutes: 10
        run: |
          python -m pytest \
            tests/interop/test_aioquic.py \
            tests/interop/test_qh3.py \
            -v --tb=short

  # peer-interop-native retired: s2n-quic tests are deleted (unimplemented
  # stub) and every ngtcp2 directional test is an adapter-pending skip, so
  # the job built two native stacks per run for zero test signal. ngtcp2
  # remains an optional developer-machine peer (tests/interop/README.md);
  # picoquicdemo (vendored, h09 + h3/WT) is the planned in-tree native peer.

  benchmark:
    name: benchmark / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiopquic
      - name: Run microbenches (latency + datagram + bulk + parallel)
        timeout-minutes: 8
        run: |
          # Four transport-level benches that complete deterministically
          # without the in-flight drain-tail issue bench_baselines_*
          # has on noisy hosted runners. All asserts run on FIN /
          # full-payload-received, never on a duration window.
          #
          #   - bench_latency_floor::test_bench_single_object_rtt:
          #     request/reply — RTT floor + p50/p99. User-facing media
          #     latency signal.
          #   - bench_datagram::test_bench_datagram_throughput:
          #     transport-level datagram path (100, 1000 datagrams).
          #     DATAGRAM frame send/recv path coverage.
          #   - bench_throughput::test_bench_stream_throughput:
          #     single-stream bulk send sweep [64KB, 1MB, 32MB].
          #     Reports Gb/s; asserts byte-exact delivery on FIN.
          #   - bench_throughput_parallel::test_bench_parallel_streams:
          #     N concurrent BIDI streams [4x1MB, 8x1MB, 16x256KB].
          #     Catches per-stream scheduling / fairness regressions
          #     the single-stream bench can't see.
          #
          # Floor enforcement deferred until hosted-runner noise is
          # calibrated across a few runs.
          python -m pytest \
            tests/bench/bench_latency_floor.py::test_bench_single_object_rtt \
            tests/bench/bench_datagram.py \
            tests/bench/bench_throughput.py \
            tests/bench/bench_throughput_parallel.py \
            -v -s --benchmark-disable
