name: CI

# PR + main test gate. Releases (TestPyPI -> PyPI -> GitHub Release) live
# in release.yml, triggered manually via workflow_dispatch.

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libssl-dev
    - name: Build picoquic
      run: ./build_picoquic.sh
    - name: Install + test
      timeout-minutes: 15
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'
        python -m pytest tests/ -v -m "not interop and not native"
