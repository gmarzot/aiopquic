name: Wheels dry-run

# Builds the wheel matrix WITHOUT publishing anywhere. Used to validate
# the cibuildwheel config + per-platform build steps before triggering
# the real Release workflow. Wheels are uploaded as workflow artifacts
# only; nothing reaches TestPyPI or PyPI.
#
# Triggers on push to gmarzot-aiomoqt-support (the v0.2.0 PR branch),
# or on manual workflow_dispatch from any branch.

on:
  push:
    branches:
      - gmarzot-aiomoqt-support
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Build sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build --sdist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: dryrun-sdist
        path: dist/*.tar.gz

  build-wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    - name: Build wheels
      uses: pypa/cibuildwheel@v2.21.3
      env:
        CIBW_ENVIRONMENT_PASS_LINUX: GITHUB_WORKSPACE
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: dryrun-wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl
